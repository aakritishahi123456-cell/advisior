version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: finsathi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-finsathi}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-finsathi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - finsathi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-finsathi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching & sessions
  redis:
    image: redis:7-alpine
    container_name: finsathi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - finsathi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: finsathi-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - finsathi-network
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: finsathi-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-finsathi}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-finsathi}
      - REDIS_URL=redis://redis:6379
      - CHROMA_URL=http://chromadb:8000
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - KHALTI_SECRET_KEY=${KHALTI_SECRET_KEY}
      - ESEWA_MERCHANT_CODE=${ESEWA_MERCHANT_CODE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - finsathi-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web App
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: finsathi-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      - NODE_ENV=production
    depends_on:
      - server
    networks:
      - finsathi-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: finsathi-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
      - web
    networks:
      - finsathi-network

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: finsathi-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - finsathi-network

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: finsathi-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - finsathi-network

  # Backup service (runs daily)
  backup:
    image: postgres:15-alpine
    container_name: finsathi-backup
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${DB_USER:-finsathi}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-finsathi}
      - BACKUP_SCHEDULE="0 2 * * *"
      - BACKUP_RETENTION_DAYS=30
    volumes:
      - ./backups:/backups
    networks:
      - finsathi-network
    command: /bin/sh -c 'while true; do pg_dump -h postgres -U ${DB_USER:-finsathi} -Fc ${DB_NAME:-finsathi} > /backups/backup_$$(date +%Y%m%d_%H%M%S).psql; find /backups -type f -mtime +$${BACKUP_RETENTION_DAYS:-30} -delete; sleep 86400; done'

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  prometheus_data:
  grafana_data:

networks:
  finsathi-network:
    driver: bridge
