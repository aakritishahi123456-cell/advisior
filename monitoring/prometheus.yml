global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'finsathi-server'
    static_configs:
      - targets: ['server:3001']
    metrics_path: '/metrics'

  - job_name: 'finsathi-nginx'
    static_configs:
      - targets: ['nginx:9113']
