version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: finsathi-postgres
    environment:
      POSTGRES_DB: finsathi
      POSTGRES_USER: finsathi_user
      POSTGRES_PASSWORD: finsathi_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - finsathi-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: finsathi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - finsathi-network

  # Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: finsathi-server
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://finsathi_user:finsathi_password@postgres:5432/finsathi
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - finsathi-network

  # Frontend Application
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: finsathi-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - finsathi-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: finsathi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infra/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - web
      - server
    networks:
      - finsathi-network

volumes:
  postgres_data:
  redis_data:

networks:
  finsathi-network:
    driver: bridge
